          ),
          h("div", { className: "bg-red-50 rounded-xl px-3 py-2", style: { border: "1px solid #fecaca" } },
            h("div", { className: "text-red-700 font-bold text-sm" }, "CRITICAL"),
            h("div", { className: "text-red-400 mt-0.5", style: { fontSize: 10 } }, "Immediate action required")
          )
        ),
        // Mini graph
        h("div", { className: "bg-white rounded-xl shadow-sm p-5", style: { border: "1px solid #e2e8f0" } },
          h("h3", { className: "text-slate-700 font-semibold text-sm mb-3" }, "Network Preview"),
          h("svg", { viewBox: "0 0 200 160", style: { width: "100%", backgroundColor: "#fafbfd", borderRadius: 8 } },
            graphEdges.slice(0,8).map((edge, i) => {
              const from = nodeById(edge.from);
              const to = nodeById(edge.to);
              const scale = 0.26, ox = 10, oy = 10;
              const color = edge.strength >= 80 ? "#ef4444" : edge.strength >= 65 ? "#f97316" : "#eab308";
              return h("line", { key: i, x1: from.x*scale+ox, y1: from.y*scale+oy, x2: to.x*scale+ox, y2: to.y*scale+oy, stroke: color, strokeWidth: 1, strokeOpacity: 0.4 });
            }),
            graphNodes.map(node => {
              const scale = 0.26, ox = 10, oy = 10;
              const style = riskFill[node.risk];
              return h("circle", { key: node.id, cx: node.x*scale+ox, cy: node.y*scale+oy, r: node.id === "center" ? 9 : 6, fill: style.fill, stroke: style.stroke, strokeWidth: 1.5 });
            })
          )
        ),
        // Platforms
        h("div", { className: "bg-white rounded-xl shadow-sm p-5", style: { border: "1px solid #e2e8f0" } },
          h("h3", { className: "text-slate-700 font-semibold text-sm mb-3" }, "Platforms Identified"),
          h("div", { className: "space-y-2" },
            [
              { name: "Twitter/X", count: 1, color: "#000" }, { name: "GitHub", count: 2, color: "#24292e" },
              { name: "Telegram", count: 2, color: "#0088cc" }, { name: "Instagram", count: 3, color: "#e1306c" },
              { name: "Reddit", count: 1, color: "#ff4500" }, { name: "Dark Forums", count: 4, color: "#7c3aed" },
            ].map(p =>
              h("div", { key: p.name, className: "flex items-center gap-2" },
                h(PlatformPill, { abbr: p.name.slice(0,2).toUpperCase(), color: p.color }),
                h("span", { className: "text-slate-600 text-xs flex-1" }, p.name),
                h("span", { className: "text-slate-400 text-xs tabular-nums mono" }, `${p.count} acct${p.count > 1 ? "s" : ""}`)
              )
            )
          )
        ),
        // Conclusion
        h("div", { className: "rounded-xl p-4", style: { border: "1px solid #bfdbfe", backgroundColor: "#eff6ff" } },
          h("div", { className: "flex items-center gap-2 mb-2" },
            h(CheckCircle2, { size: 14, className: "text-blue-600" }),
            h("span", { className: "text-blue-700 font-semibold text-xs" }, "Investigation Conclusion")
          ),
          h("p", { className: "text-blue-600 leading-relaxed", style: { fontSize: 11 } }, "Single operator confirmed across 9 accounts with 88% confidence. Metadata, behavioral, and financial evidence are sufficient for a preservation request and formal referral."),
          h("div", { className: "mt-2 text-blue-400 mono", style: { fontSize: 10 } }, "Signed: Sarah Chen · Dec 05, 2024")
        )
      )
    )
  );
}

// === Root App ===
function App() {
  const [activePage, setActivePage] = useState("dashboard");

  const pages = {
    dashboard: h(DashboardPage, { setActivePage }),
    osint: h(OSINTPage, { setActivePage }),
    "ai-analysis": h(AIAnalysisPage, { setActivePage }),
    graph: h(GraphPage, { setActivePage }),
    report: h(ReportPage, { key: "report" }),
  };

  return h("div", { className: "flex h-screen overflow-hidden", style: { fontFamily: "'Inter', system-ui, sans-serif" } },
    h(Sidebar, { activePage, setActivePage }),
    h("div", { className: "flex flex-col flex-1 min-w-0 overflow-hidden" },
      h(TopNav, { activePage, setActivePage }),
      h("main", { className: "flex-1 overflow-y-auto scrollbar-thin", style: { backgroundColor: "#f8fafc" } },
        pages[activePage]
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App, null));
</script>
</body>
</html>
